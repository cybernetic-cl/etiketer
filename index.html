<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiketer — Cybernetic SpA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
:root {
  --bg:      #eef0f4;
  --surface: #ffffff;
  --surf2:   #f5f6f8;
  --border:  #dde1e7;
  --accent:  #1a1a2e;
  --indigo:  #4f46e5;
  --text:    #0f1117;
  --muted:   #6b7280;
  --green:   #059669;
  --red:     #dc2626;
  --radius:  10px;
  --sh:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; height: 54px;
  box-shadow: var(--sh); position: sticky; top: 0; z-index: 100;
}
.logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
  color: var(--accent); margin-right: 32px; display: flex; align-items: center; gap: 10px;
}
.logo-badge {
  background: var(--accent); color: #fff; font-size: 10px;
  padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
}
.tab-btn {
  background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; padding: 17px 16px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--indigo); border-bottom-color: var(--indigo); font-weight: 600; }
.spacer { flex: 1; }
.fb-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.fb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.fb-dot.ok  { background: var(--green); }
.fb-dot.err { background: var(--red); }

/* ── Apps ── */
.app { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
.app.active { display: grid; }
#app-crear  { grid-template-columns: 390px 1fr; gap: 22px; align-items: start; }
#app-buscar { grid-template-columns: 1fr; }

/* ── Panel ── */
.panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--sh); }
.ph { padding: 13px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.ph-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
.pb { padding: 18px; }

/* ── Form ── */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px; }
.field input, .field select {
  width: 100%; background: var(--surf2); border: 1.5px solid var(--border);
  border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; padding: 8px 12px; outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--indigo); background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,.08); }

/* Radios */
.rg { display: flex; flex-wrap: wrap; gap: 5px; }
.ro input[type=checkbox] { display: none; }
.ro label {
  display: block; background: var(--surf2); border: 1.5px solid var(--border);
  border-radius: 6px; padding: 4px 11px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--muted); transition: all .15s; white-space: nowrap;
}
.ro input[type=checkbox]:checked + label { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Separador de grupo */
.rg-section { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: .5px; width: 100%; padding-top: 4px; }

/* ── Botones ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all .15s; padding: 9px 15px;
}
.btn-dark    { background: var(--accent); color: #fff; }
.btn-dark:hover { background: #2d2d4a; }
.btn-green   { background: var(--green); color: #fff; }
.btn-green:hover { background: #047857; }
.btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--indigo); color: var(--indigo); }
.btn-sm  { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; margin-top: 6px; }

/* ── Preview wrap ── */
.preview-wrap { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 70px; }
.pv-outer {
  background: #c8ccd4; border-radius: var(--radius); padding: 22px;
  display: flex; justify-content: center; align-items: center; overflow: hidden;
}

/* ══════════════════════════════════════════
   ETIQUETA — 15cm × 10cm a escala (~540×360px)
   Columnas: izq 120px | centro 1fr | der 130px
   ══════════════════════════════════════════ */
.lp {
  width: 540px; height: 360px;
  background: #fff; border: 1px solid #aaa;
  font-family: 'DM Sans', Arial, sans-serif;
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 118px 1fr 128px;
  box-shadow: 0 4px 20px rgba(0,0,0,.22);
  flex-shrink: 0;
}

/* COLUMNA IZQUIERDA — texto en vertical */
.lp-left {
  border-right: 1.5px solid #111;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 8px 6px;
  position: relative;
  overflow: hidden;
}
.lp-left-inner {
  /* Rotar todo el bloque de texto 90° para que lea de abajo hacia arriba */
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-around;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  padding: 8px 4px;
  gap: 0;
}
.lp-block {
  display: flex; flex-direction: column;
  gap: 3px;
}
.lp-btitle {
  font-size: 6.5px; font-weight: 700; color: #111;
  text-transform: uppercase; letter-spacing: .5px;
  white-space: nowrap;
}
.lp-btext {
  font-size: 6px; color: #333; line-height: 1.5;
  white-space: nowrap;
}

/* COLUMNA CENTRAL */
.lp-center {
  border-right: 1.5px solid #111;
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 10px 8px 8px; gap: 0;
}
.lp-center-top { display: flex; flex-direction: column; align-items: center; }
.lp-center-bottom { display: flex; flex-direction: column; align-items: center; width: 100%; }
.lp-logo {
  max-width: 90px; max-height: 52px; object-fit: contain;
  margin-bottom: 8px; display: block;
}
.lp-titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; color: #111; text-align: center;
  letter-spacing: 1px; line-height: 1; margin-bottom: 3px;
}
.lp-subtitulo {
  font-size: 10.5px; font-style: italic; color: #555;
  margin-bottom: 6px; text-align: center;
}
.lp-divider { width: 1px; height: 36px; background: #111; margin: 6px 0; }
.lp-cont-lbl { font-size: 8px; color: #666; font-weight: 600; letter-spacing: .5px; margin-bottom: 5px; }
.lp-cont-opts { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
.lp-citem { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #222; font-weight: 600; }
.lp-circle { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid #222; flex-shrink: 0; }
.lp-circle.on { background: #111; border-color: #111; }

/* COLUMNA DERECHA */
.lp-right {
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center; padding: 8px 7px 8px 5px; gap: 6px;
  overflow: visible; min-width: 0;
}
.lp-right-top { display: flex; flex-direction: column; align-items: flex-end; width: 100%; }
.lp-info {
  font-size: 7px; color: #333; text-align: right;
  line-height: 2; width: 100%;
}
.lp-info strong { font-weight: 700; color: #111; }
.lp-footer-lbl {
  font-size: 6px; color: #888; text-align: right;
  margin-top: 4px; width: 100%; font-style: italic;
}
.lp-bc { display: flex; justify-content: center; align-items: flex-end; width: 100%; }
.lp-bc svg { display: block; max-width: 100%; height: auto; }
.lp-dist {
  position: absolute; right: -24px; bottom: 55px;
  transform: rotate(90deg); transform-origin: right center;
  font-size: 5.5px; color: #bbb; white-space: nowrap;
}

/* ── ZPL box ── */
.zpl-box { background: #12141c; border-radius: var(--radius); padding: 14px; }
.zpl-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.zpl-lbl { font-size: 11px; font-weight: 600; color: #5070a0; text-transform: uppercase; letter-spacing: .5px; font-family: 'DM Mono', monospace; }
.zpl-box pre { font-family: 'DM Mono', monospace; font-size: 10px; color: #64b5f6; white-space: pre-wrap; word-break: break-all; max-height: 170px; overflow-y: auto; line-height: 1.6; }

/* ── Búsqueda ── */
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.search-bar input {
  flex: 1; background: #fff; border: 1.5px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 14px;
  font-family: 'DM Sans', sans-serif; padding: 9px 14px; outline: none;
}
.search-bar input:focus { border-color: var(--indigo); }

/* ── Cards ── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }
.ecard { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s, box-shadow .15s; }
.ecard:hover { border-color: var(--indigo); box-shadow: 0 2px 14px rgba(79,70,229,.1); }
.ecard-thumb { background: #c8ccd4; padding: 10px; display: flex; justify-content: center; min-height: 164px; overflow: hidden; align-items: flex-start; }
.ecard-thumb .lp { transform: scale(0.40); transform-origin: top center; margin-bottom: -218px; }
.ecard-body { padding: 13px 15px; border-top: 1px solid var(--border); }
.ecard-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: .5px; margin-bottom: 1px; }
.ecard-sub { font-size: 12px; color: var(--muted); margin-bottom: 9px; }
.chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 11px; }
.chip { background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; font-size: 11px; color: var(--muted); padding: 2px 7px; font-family: 'DM Mono', monospace; }
.ecard-acts { display: flex; gap: 8px; }

/* ── Modal ── */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-ov.open { display: flex; }
.modal { background: #fff; border: 1px solid var(--border); border-radius: 14px; width: 90vw; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.print-qty-row { display: flex; align-items: center; gap: 10px; background: var(--surf2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; }
.print-qty-row label { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.edit-inp { width:100%; background:var(--surf2); border:1.5px solid var(--border); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:8px 12px; outline:none; transition: border-color .15s; }
.edit-inp:focus { border-color:var(--indigo); background:#fff; }
.print-qty-row input { width: 70px; text-align: center; background: #fff; border: 1.5px solid var(--border); border-radius: 7px; font-size: 15px; font-weight: 700; padding: 6px 8px; outline: none; }
.print-mode-row { display: flex; gap: 8px; margin-bottom: 14px; }
.mode-btn { flex: 1; padding: 9px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surf2); font-family: 'DM Sans',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--muted); }
.mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-hdr h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); }
.modal-close:hover { color: var(--red); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 22px; right: 22px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 500;
  z-index: 9999; opacity: 0; transform: translateY(8px); transition: all .2s; max-width: 260px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok  { border-color: var(--green); color: var(--green); }
#toast.err { border-color: var(--red);   color: var(--red); }

/* ── Misc ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 42px; margin-bottom: 10px; }
.loader { display: flex; justify-content: center; padding: 40px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ean-hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
.divider-label { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: .5px; margin: 8px 0 4px; }

/* ── Print ── */
@media print {
  body * { visibility: hidden !important; }
  #print-area, #print-area * { visibility: visible !important; }
  #print-area {
    position: fixed; inset: 0; background: #fff;
    display: flex; flex-wrap: wrap; align-content: flex-start;
    gap: 4mm; padding: 8mm; align-items: flex-start; justify-content: flex-start;
  }
  #print-area .lp {
    width: 567px !important; height: 378px !important;
    transform: none !important; margin: 0 !important;
    box-shadow: none !important; border: 0.5mm solid #ccc !important;
    page-break-inside: avoid; flex-shrink: 0;
  }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">🏷 Etiketer <span class="logo-badge">v2</span></div>
  <button class="tab-btn active" id="tab-crear"  onclick="showTab('crear')">+ Crear Etiqueta</button>
  <button class="tab-btn"        id="tab-buscar" onclick="showTab('buscar')">🔍 Buscar / Imprimir</button>
  <div class="spacer"></div>
  <div class="fb-status">
    <div class="fb-dot" id="fb-dot"></div>
    <span id="fb-label">Conectando...</span>
  </div>
</header>

<!-- ══ CREAR ══ -->
<div class="app active" id="app-crear">

  <div class="panel">
    <div class="ph"><span class="ph-title">Datos de la etiqueta</span></div>
    <div class="pb">

      <div class="field">
        <label>Logo / Marca</label>
        <select id="f-logo" onchange="renderPreview()">
          <option value="dmp">DMP — Distribuidora de Materias Primas</option>
          <option value="aio">AIO — All In One</option>
          <option value="masco">Mascokits</option>
        </select>
      </div>

      <div class="field">
        <label>Título</label>
        <input id="f-titulo" type="text" placeholder="CAFEÍNA ANHIDRA" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Subtítulo / Grado</label>
        <input id="f-subtitulo" type="text" placeholder="Food Grade" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Contenido Neto</label>
        <div class="rg" id="cont-group"></div>
        <input id="f-cont-custom" type="text" placeholder="Otro (ej: 20 Litros, 50 Kilos...)" style="margin-top:8px;" oninput="if(this.value){selConts=[];document.querySelectorAll('#cont-group input').forEach(i=>i.checked=false);}renderPreview()">
      </div>

      <div class="field">
        <label>Fecha de Vencimiento</label>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0;cursor:pointer;">
            <input type="checkbox" id="f-venc-auto" onchange="toggleVencAuto()" style="width:15px;height:15px;accent-color:var(--indigo);cursor:pointer;">
            Auto desde hoy
          </label>
          <select id="f-venc-years" onchange="calcVencAuto()" style="display:none;flex:1;background:var(--surf2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;outline:none;">
            <option value="1">+ 1 año</option>
            <option value="2">+ 2 años</option>
          </select>
        </div>
        <input id="f-venc" type="month" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>País de Origen</label>
        <input id="f-pais" type="text" value="China" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Dosis / Instrucción de uso</label>
        <input id="f-dosis" type="text" value="0,5 gr al día" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Código EAN-13</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="f-ean" type="text" maxlength="13" placeholder="Autogenerado" style="flex:1;" oninput="renderPreview()">
          <button class="btn btn-outline btn-sm" onclick="nuevoEAN()">🎲 Nuevo</button>
        </div>
        <div class="ean-hint" id="ean-hint"></div>
      </div>

      <div class="field">
        <label>Footer / Nota (opcional)</label>
        <input id="f-footer" type="text" value="DMP es una marca de Cybernetic SpA, Providencia, Santiago de Chile. https://distribuidoramp.cl/" oninput="renderPreview()">
      </div>

      <button class="btn btn-green btn-full" onclick="guardar()">💾 Guardar en Firebase</button>

    </div>
  </div>

  <!-- Preview + ZPL -->
  <div class="preview-wrap">
    <div class="panel">
      <div class="ph">
        <span class="ph-title">Vista Previa — 15 × 10 cm</span>
        <span id="preview-count" style="font-size:11px;font-weight:600;color:var(--indigo);background:#ede9fe;padding:2px 8px;border-radius:12px;"></span>
      </div>
      <div style="padding:0;">
        <div class="pv-outer">
          <div id="preview-main" class="lp"></div>
        </div>
      </div>
    </div>

    <div class="zpl-box">
      <div class="zpl-hdr">
        <span class="zpl-lbl">ZPL · 203 DPI · 1218 × 812 dots</span>
        <button class="btn btn-outline btn-sm" style="background:#1e2130;color:#64b5f6;border-color:#2a3550;" onclick="copiarZPL()">📋 Copiar</button>
      </div>
      <pre id="zpl-out">^XA^XZ</pre>
    </div>
  </div>
</div>

<!-- ══ BUSCAR ══ -->
<div class="app" id="app-buscar">
  <div>
    <div class="search-bar">
      <input id="search-q" type="text" placeholder="Buscar por título, subtítulo o EAN..." oninput="filtrar()">
      <button class="btn btn-outline" onclick="cargar()">🔄 Actualizar</button>
    </div>
    <div id="lista"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- Modal ver/imprimir -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-titulo">Etiqueta</h2>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Modal editar -->
<div class="modal-ov" id="edit-ov" onclick="if(event.target===this)cerrarEdit()">
  <div class="modal" style="max-width:500px;">
    <div class="modal-hdr">
      <h2>✏️ Editar Etiqueta</h2>
      <button class="modal-close" onclick="cerrarEdit()">✕</button>
    </div>
    <div id="edit-body"></div>
  </div>
</div>

<div id="print-area" style="display:none;"></div>
<div id="toast"></div>

<!-- Firebase -->

// ══ OPCIONES CONTENIDO ══
const OPTS_PESO   = ['100 gr','250 gr','500 gr','1 Kilo','5 Kilos','10 Kilos','25 Kilos'];
const OPTS_LIQUID = ['500 ml','1 Litro','1 Galón','5 Litros','20 Litros'];
let selConts = ['1 Kilo'];

(function initRadios(){
  const g = document.getElementById('cont-group');
  const mkSection = (lbl) => {
    const s = document.createElement('div');
    s.className = 'rg-section'; s.textContent = lbl; return s;
  };
  g.appendChild(mkSection('Peso'));
  OPTS_PESO.forEach((o,i) => addRadio(g, o, 'p'+i, selConts.includes(o)));
  g.appendChild(mkSection('Líquidos'));
  OPTS_LIQUID.forEach((o,i) => addRadio(g, o, 'l'+i, selConts.includes(o)));
})();

function addRadio(g, o, id, checked=false) {
  const d = document.createElement('div');
  d.className = 'ro';
  d.innerHTML = `<input type="checkbox" id="co${id}" value="${o}" ${checked?'checked':''}><label for="co${id}">${o}</label>`;
  d.querySelector('input').addEventListener('change', function(){
    if(this.checked && !selConts.includes(o)) selConts.push(o);
    else selConts = selConts.filter(x=>x!==o);
    document.getElementById('f-cont-custom').value = '';
    renderPreview();
  });
  g.appendChild(d);
}

// ══ EAN-13 ══
function ean13check(base12){
  let s = 0;
  for(let i = 0; i < 12; i++){
    const d = parseInt(base12[i], 10);
    if(isNaN(d)) return '0';
    s += d * (i % 2 === 0 ? 1 : 3);
  }
  return String((10 - (s % 10)) % 10);
}
function makeEAN(){
  // Genera 9 dígitos aleatorios (prefijo 978 + 9 dígitos = 12) + check
  let rand = '';
  for(let i = 0; i < 9; i++) rand += String(Math.floor(Math.random() * 10));
  const base12 = '978' + rand;          // exactamente 12 dígitos
  const check  = ean13check(base12);
  const ean    = base12 + check;
  console.log('EAN generado:', ean, 'len:', ean.length);
  return ean;
}
let curEAN = makeEAN();

function nuevoEAN(){ curEAN=makeEAN(); document.getElementById('f-ean').value=curEAN; renderPreview(); }
function getEAN(){ const v=(document.getElementById('f-ean').value||'').trim(); return v.length===13?v:curEAN; }

      const custom = document.getElementById('f-cont-custom').value.trim();
      if(custom) return [custom];
      return selConts.length ? [...selConts] : ['1 Kilo'];
    })(),
    venc:      (()=>{
      const auto = document.getElementById('f-venc-auto').checked;
      if(auto){
        const years = parseInt(document.getElementById('f-venc-years').value||'1');
        const exp   = new Date(new Date().getFullYear()+years, new Date().getMonth(), 1);
        return exp.getFullYear()+'-'+String(exp.getMonth()+1).padStart(2,'0');
      }
      return document.getElementById('f-venc').value||'';
    })(),
    venc_auto:  document.getElementById('f-venc-auto').checked,
    venc_years: parseInt(document.getElementById('f-venc-years').value||'1'),
    pais:      document.getElementById('f-pais').value    ||'Chile',
    dosis:     document.getElementById('f-dosis').value   ||'',
    footer:    document.getElementById('f-footer').value  ||'DMP es una marca de Cybernetic SpA, Providencia, Santiago de Chile. https://distribuidoramp.cl/',
    ean13:     getEAN(),
  };
}

// ══ HTML ETIQUETA ══
const STD_PESO   = ['¼ Kilo','½ Kilo','1 Kilo'];
const STD_LIQUID = ['500 ml','1 Litro','1 Galón','5 Litros'];

function resolveVenc(d){
  // Si la etiqueta tiene auto-fecha, recalcula desde hoy
  if(d.venc_auto && d.venc_years){
    const exp = new Date(new Date().getFullYear()+d.venc_years, new Date().getMonth(), 1);
    return exp.getFullYear()+'-'+String(exp.getMonth()+1).padStart(2,'0');
  }
  return d.venc||'';
}

function labelHTML(d, sfx){
  // Logo: imagen o texto
  const logoKey = (d.logo||'dmp').toLowerCase();
  const logoSrc = LOGOS[logoKey];
  const logoEl  = logoSrc
    ? `<img src="${logoSrc}" class="lp-logo" alt="logo">`
    : `<div style="background:#111;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;padding:5px 14px;letter-spacing:2px;margin-bottom:8px;">${LOGO_TEXT[logoKey]||'DMP'}</div>`;

  // Contenido neto — solo el valor seleccionado
  const contHTML = `<div class="lp-citem" style="font-size:15px;font-weight:700;letter-spacing:.5px;">${d.contenido}</div>`;

  // Fecha venc — dinámica si es auto
  const vencVal = resolveVenc(d);
  const fv = vencVal ? (([y,m])=>`${m}/${y.slice(2)}`)(vencVal.split('-')) : '';

  // Campos opcionales: solo los que tienen valor
  const infoLines = [
    d.dosis ? `<strong>Dosis:</strong> ${d.dosis}` : '',
    d.pais  ? `<strong>Origen:</strong> ${d.pais}` : '',
    fv      ? `<strong>Venc:</strong> ${fv}` : '',
  ].filter(Boolean).join('<br>');

  // Subtítulo solo si tiene contenido
  const subEl = d.subtitulo
    ? `<div class="lp-subtitulo">${d.subtitulo}</div>`
    : '';

  return `
  <div class="lp-left">
    <div class="lp-left-inner">
      <div class="lp-block">
        <span class="lp-btitle">Manipulación y almacenaje</span>
        <span class="lp-btext">Utilice siempre EPP adecuado.</span>
        <span class="lp-btext">Almacene en áreas secas, frescas</span>
        <span class="lp-btext">y ventiladas. Evite calor y sol.</span>
      </div>
      <div class="lp-block">
        <span class="lp-btitle">Primeros auxilios</span>
        <span class="lp-btext">En caso de intoxicación llame al</span>
        <span class="lp-btext">CITUC: 02 2635 3800</span>
        <span class="lp-btext">Atención 24 hrs todos los días.</span>
      </div>
    </div>
  </div>
  <div class="lp-center">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;">
    ${logoEl}
    <div class="lp-titulo">${d.titulo}</div>
    ${subEl}
    </div>
    <div class="lp-divider" style="margin-top:auto;"></div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="lp-cont-lbl">CONTENIDO NETO</div>
      <div class="lp-cont-opts">${contHTML}</div>
    </div>
    ${d.footer ? `<div style="font-size:6.5px;color:#888;margin-top:8px;font-style:italic;text-align:center;line-height:1.4;">${d.footer}</div>` : ''}
  </div>
  <div class="lp-right">
    ${infoLines ? `<div class="lp-info">${infoLines}</div>` : ''}
    <div class="lp-bc"><canvas id="bc-${sfx}"></canvas></div>
  </div>
  <div class="lp-dist">Distribuido por Cybernetic SpA, Providencia, Santiago.</div>`;
}

function drawBC(ean, canvasId){
  if (!ean || ean.length !== 13 || /[^0-9]/.test(ean)) {
    console.warn('EAN invalido:', ean); return;
  }
  const el = document.getElementById(canvasId);
  if (!el) { console.warn('canvas not found:', canvasId); return; }
  try {
    JsBarcode(el, ean, {
      format:'EAN13', width:1.5, height:55,
      displayValue:true, fontSize:9, margin:4,
      background:'#ffffff', lineColor:'#000',
      textMargin: 2,
    });
    // forzar tamaño visible
    el.style.width  = '112px';
    el.style.height = 'auto';
    el.style.display = 'block';
  } catch(e){ console.warn('barcode error', e); }
}

// ══ VENCIMIENTO AUTO ══
function calcVencAuto(){
  const years = parseInt(document.getElementById('f-venc-years').value || '1');
  const now   = new Date();
  const exp   = new Date(now.getFullYear() + years, now.getMonth(), 1);
  const y     = exp.getFullYear();
  const m     = String(exp.getMonth() + 1).padStart(2, '0');
  document.getElementById('f-venc').value = y + '-' + m;
  renderPreview();
}

function toggleVencAuto(){
  const auto = document.getElementById('f-venc-auto').checked;
  document.getElementById('f-venc-years').style.display = auto ? 'flex' : 'none';
  document.getElementById('f-venc').style.display       = auto ? 'none' : 'block';
  if(auto) calcVencAuto();
  else renderPreview();
}

// ══ RENDER PREVIEW ══
function renderPreview(){
  const eanField = document.getElementById('f-ean').value.trim();
  if(eanField.length===13) curEAN=eanField;
  document.getElementById('f-ean').value = curEAN;
  document.getElementById('ean-hint').textContent = curEAN;
  const d = datos();
  // Preview shows first selected contenido
  const previewD = {...d, contenido: d.contenidos[0]||'—'};
  const el = document.getElementById('preview-main');
  el.innerHTML = labelHTML(previewD,'prev');
  setTimeout(()=>drawBC(previewD.ean13,'bc-prev'),80);
  document.getElementById('zpl-out').textContent = d.contenidos.map(cont=>buildZPL({...d,contenido:cont})).join('\n\n; ── siguiente etiqueta ──\n\n');
  // Show badge count
  const badge = document.getElementById('preview-count');
  if(badge) badge.textContent = d.contenidos.length > 1 ? d.contenidos.length+' variantes' : '';
}

// ══ ZPL ══
function buildZPL(d){
  const W=1218,H=812;
  const _rv = resolveVenc(d);
  const fv = _rv?(([y,m])=>`${m}/${y.slice(2)}`)(_rv.split('-')):'--/--';
  const selP = STD_PESO.indexOf(d.contenido);
  const selL = STD_LIQUID.indexOf(d.contenido);
  const lbP  = ['1/4 Kilo','1/2 Kilo','1 Kilo'];
  const lbL  = ['500ml','1 Litro','1 Galon','5 Litros'];
  let cZPL='';
  if(selP>=0){
    [820,920,1020].forEach((x,i)=>{
      cZPL+=`^FO${x},630^GC18,3,B^FS\n`;
      if(i===selP) cZPL+=`^FO${x+2},632^GC14,14,B^FS\n`;
      cZPL+=`^FO${x-14},652^A0N,13,13^FD${lbP[i]}^FS\n`;
    });
  } else if(selL>=0){
    [800,880,960,1040].forEach((x,i)=>{
      cZPL+=`^FO${x},630^GC18,3,B^FS\n`;
      if(i===selL) cZPL+=`^FO${x+2},632^GC14,14,B^FS\n`;
      cZPL+=`^FO${x-14},652^A0N,12,12^FD${lbL[i]}^FS\n`;
    });
  } else {
    cZPL=`^FO790,635^A0N,22,22^FD${d.contenido}^FS\n`;
  }
  const tituloLine = d.titulo.length>14
    ? `^FO340,92^A0N,52,50^FD${d.titulo}^FS`
    : `^FO340,88^A0N,62,58^FD${d.titulo}^FS`;
  return `^XA
^PW${W}
^LL${H}
^CI28
^FO0,0^GB${W},${H},3^FS
^FO310,0^GB3,${H},3^FS
^FO985,0^GB3,${H},3^FS
; Texto vertical izquierda (rotado)
^FO8,20^A0N,14,14^FDManipulacion y almacenaje:^FS
^FO8,40^A0N,11,11^FDUtilice EPP adecuado.^FS
^FO8,56^A0N,11,11^FDAlmacene en areas secas, frescas^FS
^FO8,70^A0N,11,11^FDy ventiladas. Evite calor y sol.^FS
^FO8,108^A0N,14,14^FDPrimeros auxilios:^FS
^FO8,128^A0N,11,11^FDEn caso de intoxicacion llame al^FS
^FO8,142^A0N,11,11^FDCITUC: 02 2635 3800^FS
^FO8,156^A0N,11,11^FDatencion 24hrs todos los dias.^FS
; Logo DMP (texto en ZPL - la imagen no se transfiere a ZPL)
^FO370,18^GB240,60,60^FS
^FO378,24^FR^A0N,42,42^FD${LOGO_TEXT[(d.logo||'dmp').toLowerCase()]||'DMP'}^FS
; Titulo
${tituloLine}
; Subtitulo
^FO370,168^A0N,22,22^FD${d.subtitulo}^FS
; Divider
^FO645,205^GB3,90,3^FS
; Cont neto
^FO518,308^A0N,18,18^FDCONTENIDO NETO^FS
${cZPL}
; Columna derecha
^FO995,22^A0N,14,14^FDDosis: ${d.dosis}^FS
^FO995,44^A0N,14,14^FDOrigen: ${d.pais}^FS
^FO995,66^A0N,14,14^FDVencimiento: ${fv}^FS
^FO988,560
^BY2,3,65
^BEN,65,Y,N
^FD${d.ean13}^FS
^FO988,780^A0N,11,11^FDCybernetic SpA, Santiago^FS
^XZ`;
}

function copiarZPL(){
  navigator.clipboard.writeText(document.getElementById('zpl-out').textContent)
    .then(()=>toast('ZPL copiado ✓','ok'));
}

// ══ GUARDAR ══
async function guardar(){
  if(!window.$db){ toast('Firebase no conectado','err'); return; }
  const d = datos();
  const base = {...d};
  delete base.contenidos;
  try {
    let count = 0;
    for(const cont of d.contenidos){
      const ean = makeEAN(); // EAN único por variante
      const doc = {
        ...base,
        contenido: cont,
        titulo_completo: d.titulo + ' - ' + cont,
        ean13: ean,
        zpl: buildZPL({...base, contenido: cont, ean13: ean}),
        created_at: window.$ts(),
      };
      await window.$add(window.$col('etiquetas'), doc);
      count++;
    }
    toast(count > 1 ? count+' etiquetas guardadas ✓' : 'Etiqueta guardada ✓', 'ok');
  } catch(e){ toast('Error: '+e.message,'err'); }
}

// ══ BUSCAR ══
let todas=[];
async function cargar(){
  if(!window.$db){
    document.getElementById('lista').innerHTML='<div class="empty"><div class="empty-icon">🔌</div><p>Configura Firebase primero.</p></div>';
    return;
  }
  document.getElementById('lista').innerHTML='<div class="loader"><div class="spinner"></div></div>';
  try {
    const snap=await window.$get(window.$q(window.$col('etiquetas'),window.$ord('created_at','desc')));
    todas=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderLista(todas);
  } catch(e){
    document.getElementById('lista').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function filtrar(){
  const q=document.getElementById('search-q').value.toLowerCase();
  renderLista(todas.filter(e=>(e.titulo||'').toLowerCase().includes(q)||(e.subtitulo||'').toLowerCase().includes(q)||(e.ean13||'').includes(q)));
}

function renderLista(lista){
  if(!lista.length){
    document.getElementById('lista').innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>No hay etiquetas guardadas aún.</p></div>';
    return;
  }
  const fv=e=>e.venc?(([y,m])=>`Venc: ${m}/${y.slice(2)}`)(e.venc.split('-')):'';
  document.getElementById('lista').innerHTML=
    `<div class="cards-grid">${lista.map(e=>`
      <div class="ecard">
        <div class="ecard-thumb"><div class="lp">${labelHTML(e,'c'+e.id)}</div></div>
        <div class="ecard-body">
          <div class="ecard-titulo">${e.titulo||'—'}</div>
          <div class="ecard-sub">${e.subtitulo||''} · ${e.contenido||''}</div>
          <div class="chips">
            <span class="chip">${e.ean13||''}</span>
            ${fv(e)?`<span class="chip">${fv(e)}</span>`:''}
            <span class="chip">${(e.logo||'').toUpperCase()}</span>
          </div>
          <div class="ecard-acts">
            <button class="btn btn-dark btn-sm" onclick="abrirModal('${e.id}')">🖨️ Imprimir</button>
            <button class="btn btn-outline btn-sm" onclick="abrirEdit('${e.id}')">✏️ Editar</button>
            <button class="btn btn-outline btn-sm" onclick="copyZPLcard('${e.id}')">📋 ZPL</button>
          </div>
        </div>
      </div>`).join('')}</div>`;
  setTimeout(()=>lista.forEach(e=>drawBC(e.ean13,'bc-c'+e.id)),120);
}

// ══ MODAL VER/IMPRIMIR ══
let printMode = 'html'; // 'html' | 'zpl'

function abrirModal(id){
  const e = todas.find(x=>x.id===id); if(!e) return;

  document.getElementById('modal-titulo').textContent = e.titulo_completo||e.titulo||'Etiqueta';

  // Build modal with DOM to avoid backtick/quote escaping issues
  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  // Preview
  const prev = document.createElement('div');
  prev.style.cssText = 'background:#c8ccd4;border-radius:8px;padding:16px;display:flex;justify-content:center;overflow:hidden;margin-bottom:16px;';
  const lpDiv = document.createElement('div');
  lpDiv.className = 'lp';
  lpDiv.innerHTML = labelHTML(e, 'm'+id);
  prev.appendChild(lpDiv);
  body.appendChild(prev);

  // Qty row
  const qtyRow = document.createElement('div');
  qtyRow.className = 'print-qty-row';
  qtyRow.innerHTML = '<label>Cantidad de etiquetas</label>';
  const qtyIn = document.createElement('input');
  qtyIn.type='number'; qtyIn.id='print-qty'; qtyIn.value='1'; qtyIn.min='1'; qtyIn.max='500';
  qtyRow.appendChild(qtyIn);
  body.appendChild(qtyRow);

  // Mode buttons
  const modeRow = document.createElement('div');
  modeRow.className = 'print-mode-row';
  const btnHtml = document.createElement('button');
  btnHtml.className='mode-btn active'; btnHtml.id='mode-html';
  btnHtml.textContent='Imprimir HTML'; btnHtml.onclick=()=>setPrintMode('html');
  const btnZpl = document.createElement('button');
  btnZpl.className='mode-btn'; btnZpl.id='mode-zpl';
  btnZpl.textContent='Enviar ZPL'; btnZpl.onclick=()=>setPrintMode('zpl');
  modeRow.appendChild(btnHtml); modeRow.appendChild(btnZpl);
  body.appendChild(modeRow);

  // Action buttons
  const actRow = document.createElement('div');
  actRow.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;';
  const btnEjec = document.createElement('button');
  btnEjec.className='btn btn-dark'; btnEjec.style.cssText='flex:1;justify-content:center;';
  btnEjec.textContent='Ejecutar'; btnEjec.onclick=()=>ejecutarImpresion(id);
  const btnCopyZpl = document.createElement('button');
  btnCopyZpl.className='btn btn-outline'; btnCopyZpl.textContent='Copiar ZPL';
  btnCopyZpl.onclick=()=>copyZPLcard(id);
  actRow.appendChild(btnEjec); actRow.appendChild(btnCopyZpl);
  body.appendChild(actRow);

  // ZPL preview box (set textContent to avoid injection)
  const zplBox = document.createElement('div');
  zplBox.className='zpl-box';
  const zplHdr = document.createElement('div');
  zplHdr.className='zpl-hdr';
  zplHdr.innerHTML='<span class="zpl-lbl">ZPL Preview</span>';
  const zplPre = document.createElement('pre');
  zplPre.style.cssText='font-size:10px;color:#64b5f6;white-space:pre-wrap;max-height:130px;overflow-y:auto;';
  zplPre.textContent = buildZPL(e); // safe: textContent escapes everything
  zplBox.appendChild(zplHdr); zplBox.appendChild(zplPre);
  body.appendChild(zplBox);

  document.getElementById('modal-ov').classList.add('open');
  setTimeout(()=>drawBC(e.ean13,'bc-m'+id), 80);
}

function setPrintMode(mode){
  printMode = mode;
  document.getElementById('mode-html').classList.toggle('active', mode==='html');
  document.getElementById('mode-zpl').classList.toggle('active',  mode==='zpl');
}

function ejecutarImpresion(id){
  const e   = todas.find(x=>x.id===id); if(!e) return;
  const qty = Math.max(1, parseInt(document.getElementById('print-qty').value)||1);
  if(printMode === 'zpl'){
    // Genera N copias ZPL concatenadas
    const zpl = buildZPL(e);
    const sep = '\n';
    const multi = Array(qty).fill(zpl).join(sep);
    navigator.clipboard.writeText(multi).then(()=>toast(`ZPL x${qty} copiado ✓`,'ok'));
  } else {
    // Imprime HTML con N copias
    imprimirHTML(e, qty);
  }
}

function cerrarModal(){ document.getElementById('modal-ov').classList.remove('open'); }

function imprimirHTML(e, qty){
  const pa = document.getElementById('print-area');
  pa.style.display = 'flex';
  pa.style.flexWrap = 'wrap';
  pa.style.gap = '4mm';
  // Generar N copias con IDs únicos
  let html = '';
  for(let i=0; i<qty; i++){
    html += `<div class="lp" style="page-break-inside:avoid;">${labelHTML(e,'pr'+i)}</div>`;
  }
  pa.innerHTML = html;
  // Dibujar barcodes en todas las copias
  let drawn = 0;
  const tryDraw = () => {
    for(let i=0; i<qty; i++) drawBC(e.ean13, 'bc-pr'+i);
    drawn++;
    if(drawn < 2) setTimeout(tryDraw, 150);
    else setTimeout(()=>{ window.print(); pa.style.display='none'; }, 300);
  };
  setTimeout(tryDraw, 100);
}

function imprimir(id){
  const e=todas.find(x=>x.id===id); if(!e) return;
  imprimirHTML(e, 1);
}

// ══ EDITAR ══
const EDIT_FIELDS = [
  { id:'ed-titulo',    label:'Título',           type:'text',  key:'titulo'    },
  { id:'ed-subtitulo', label:'Subtítulo',         type:'text',  key:'subtitulo' },
  { id:'ed-contenido', label:'Contenido Neto',    type:'text',  key:'contenido' },
  { id:'ed-venc',      label:'Fecha Vencimiento', type:'month', key:'venc'      },
  { id:'ed-pais',      label:'País de Origen',    type:'text',  key:'pais'      },
  { id:'ed-dosis',     label:'Dosis',             type:'text',  key:'dosis'     },
  { id:'ed-footer',    label:'Footer',            type:'text',  key:'footer'    },
];

function abrirEdit(id){
  const e = todas.find(x=>x.id===id); if(!e) return;
  const body = document.getElementById('edit-body');

  // Build form using DOM — avoids quote escaping issues
  const inp = (f) => `
    <div class="field">
      <label>${f.label}</label>
      <input id="${f.id}" type="${f.type}" class="edit-inp">
    </div>`;
  body.innerHTML = EDIT_FIELDS.map(inp).join('') + `
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button class="btn btn-green" id="btn-save-edit" style="flex:1;justify-content:center;">💾 Guardar Cambios</button>
      <button class="btn btn-outline" onclick="cerrarEdit()">Cancelar</button>
    </div>`;

  // Set values safely via .value property
  EDIT_FIELDS.forEach(f => {
    document.getElementById(f.id).value = e[f.key] || '';
  });
  document.getElementById('btn-save-edit').onclick = () => guardarEdit(id);
  document.getElementById('edit-ov').classList.add('open');
}

function cerrarEdit(){ document.getElementById('edit-ov').classList.remove('open'); }

async function guardarEdit(id){
  if(!window.$db){ toast('Firebase no conectado','err'); return; }
  const titulo    = document.getElementById('ed-titulo').value.trim();
  const contenido = document.getElementById('ed-contenido').value.trim();
  const updates = {
    titulo,
    subtitulo:      document.getElementById('ed-subtitulo').value.trim(),
    contenido,
    titulo_completo: titulo + (contenido ? ' - '+contenido : ''),
    venc:           document.getElementById('ed-venc').value,
    pais:           document.getElementById('ed-pais').value.trim(),
    dosis:          document.getElementById('ed-dosis').value.trim(),
    footer:         document.getElementById('ed-footer').value.trim(),
  };
  // Recalcular ZPL con datos actualizados
  const e = todas.find(x=>x.id===id);
  if(e){ updates.zpl = buildZPL({...e,...updates}); }
  try {
    await window.$upd(window.$doc(id), updates);
    toast('Cambios guardados ✓','ok');
    cerrarEdit();
    cargar(); // recargar lista
  } catch(err){ toast('Error: '+err.message,'err'); }
}

function copyZPLcard(id){
  const e=todas.find(x=>x.id===id); if(!e) return;
  navigator.clipboard.writeText(buildZPL(e)).then(()=>toast('ZPL copiado ✓','ok'));
}
