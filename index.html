<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiketer — Cybernetic SpA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>


<style>
:root {
  --bg:      #eef0f4;
  --surface: #ffffff;
  --surf2:   #f5f6f8;
  --border:  #dde1e7;
  --accent:  #1a1a2e;
  --indigo:  #4f46e5;
  --text:    #0f1117;
  --muted:   #6b7280;
  --green:   #059669;
  --red:     #dc2626;
  --radius:  10px;
  --sh:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; height: 54px;
  box-shadow: var(--sh); position: sticky; top: 0; z-index: 100;
}
.logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
  color: var(--accent); margin-right: 32px; display: flex; align-items: center; gap: 10px;
}
.logo-badge {
  background: var(--accent); color: #fff; font-size: 10px;
  padding: 2px 6px; border-radius: 4px; font-family: ;
  letter-spacing: 1px;
}
.tab-btn {
  background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; padding: 17px 16px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--indigo); border-bottom-color: var(--indigo); font-weight: 600; }
.spacer { flex: 1; }
.fb-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.fb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.fb-dot.ok  { background: var(--green); }
.fb-dot.err { background: var(--red); }

/* ── Apps ── */
.app { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
.app.active { display: grid; }
#app-crear  { grid-template-columns: 390px 1fr; gap: 22px; align-items: start; }
#app-buscar { grid-template-columns: 1fr; }

/* ── Panel ── */
.panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--sh); }
.ph { padding: 13px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.ph-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
.pb { padding: 18px; }

/* ── Form ── */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px; }
.field input, .field select {
  width: 100%; background: var(--surf2); border: 1.5px solid var(--border);
  border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; padding: 8px 12px; outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--indigo); background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,.08); }

/* Radios */
.rg { display: flex; flex-wrap: wrap; gap: 5px; }
.ro input[type=checkbox] { display: none; }
.ro label {
  display: block; background: var(--surf2); border: 1.5px solid var(--border);
  border-radius: 6px; padding: 4px 11px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--muted); transition: all .15s; white-space: nowrap;
}
.ro input[type=checkbox]:checked + label { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Separador de grupo */
.rg-section { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: .5px; width: 100%; padding-top: 4px; }

/* ── Botones ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all .15s; padding: 9px 15px;
}
.btn-dark    { background: var(--accent); color: #fff; }
.btn-dark:hover { background: #2d2d4a; }
.btn-green   { background: var(--green); color: #fff; }
.btn-green:hover { background: #047857; }
.btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--indigo); color: var(--indigo); }
.btn-sm  { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; margin-top: 6px; }

/* ── Preview wrap ── */
.preview-wrap { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 70px; }
.pv-outer {
  background: #c8ccd4; border-radius: var(--radius); padding: 22px;
  display: flex; justify-content: center; align-items: center; overflow: hidden;
}

/* ══════════════════════════════════════════
   ETIQUETA — 15cm × 10cm a escala (~540×360px)
   Columnas: izq 120px | centro 1fr | der 130px
   ══════════════════════════════════════════ */
.lp {
  width: 540px; height: 360px;
  background: #fff; border: 1px solid #aaa;
  font-family: 'DM Sans', Arial, sans-serif;
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 118px 1fr 128px;
  box-shadow: 0 4px 20px rgba(0,0,0,.22);
  flex-shrink: 0;
}

/* COLUMNA IZQUIERDA — texto en vertical */
.lp-left {
  border-right: 1.5px solid #111;
  position: relative;
  overflow: hidden;
}
.lp-left-inner {
  /* Rotar todo el bloque junto: ancho del contenedor = alto de la etiqueta */
  position: absolute;
  /* Centrado en la columna izq: translateX(-50%) mueve al centro horizontal */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-90deg);
  transform-origin: center center;
  /* Ancho = alto de la etiqueta (360px), alto = ancho de la columna (118px) */
  width: 360px;
  height: 118px;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  justify-content: space-around;
  padding: 6px 8px;
  gap: 10px;
}
.lp-block {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1px;
  flex: 1;
}
.lp-btitle {
  font-size: 6.5px; font-weight: 700; color: #111;
  text-transform: uppercase; letter-spacing: .5px;
  white-space: nowrap;
  display: block;
  margin-bottom: 2px;
}
.lp-btext {
  font-size: 6px; color: #333; line-height: 1.5;
  white-space: nowrap;
  display: block;
}

/* COLUMNA CENTRAL */
.lp-center {
  border-right: 1.5px solid #111;
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 10px 8px 8px; gap: 0;
}
.lp-center-top { display: flex; flex-direction: column; align-items: center; }
.lp-center-bottom { display: flex; flex-direction: column; align-items: center; width: 100%; }
.lp-logo {
  max-width: 90px; max-height: 52px; object-fit: contain;
  margin-bottom: 8px; display: block;
}
.lp-titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; color: #111; text-align: center;
  letter-spacing: 1px; line-height: 1; margin-bottom: 3px;
}
.lp-subtitulo {
  font-size: 13px; font-style: italic; color: #555;
  margin-bottom: 6px; text-align: center;
}
.lp-subtitulo2 {
  font-size: 11.5px; color: #666;
  margin-top: 1px; margin-bottom: 6px; text-align: center;
}
.lp-divider { width: 1px; height: 36px; background: #111; margin: 6px 0; }
.lp-cont-lbl { font-size: 8px; color: #666; font-weight: 600; letter-spacing: .5px; margin-bottom: 5px; }
.lp-cont-opts { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
.lp-citem { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #222; font-weight: 600; }
.lp-circle { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid #222; flex-shrink: 0; }
.lp-circle.on { background: #111; border-color: #111; }

/* COLUMNA DERECHA */
.lp-right {
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center; padding: 8px 7px 8px 5px; gap: 6px;
  overflow: visible; min-width: 0;
}
.lp-right-top { display: flex; flex-direction: column; align-items: flex-end; width: 100%; }
.lp-info {
  font-size: 7px; color: #333; text-align: right;
  line-height: 2; width: 100%;
}
.lp-info strong { font-weight: 700; color: #111; }
.lp-footer-lbl {
  font-size: 6px; color: #888; text-align: right;
  margin-top: 4px; width: 100%; font-style: italic;
}
.lp-bc { display: flex; justify-content: center; align-items: flex-end; width: 100%; }
.lp-bc svg { display: block; max-width: 100%; height: auto; }
.lp-dist {
  position: absolute; right: -24px; bottom: 55px;
  transform: rotate(90deg); transform-origin: right center;
  font-size: 5.5px; color: #bbb; white-space: nowrap;
}



/* ── Búsqueda ── */
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.search-bar input {
  flex: 1; background: #fff; border: 1.5px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 14px;
  font-family: 'DM Sans', sans-serif; padding: 9px 14px; outline: none;
}
.search-bar input:focus { border-color: var(--indigo); }

/* ── Cards ── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }
.ecard { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s, box-shadow .15s; }
.ecard:hover { border-color: var(--indigo); box-shadow: 0 2px 14px rgba(79,70,229,.1); }
.ecard-thumb { background: #c8ccd4; padding: 10px; display: flex; justify-content: center; min-height: 164px; overflow: hidden; align-items: flex-start; }
.ecard-thumb .lp { transform: scale(0.40); transform-origin: top center; margin-bottom: -218px; }
.ecard-body { padding: 13px 15px; border-top: 1px solid var(--border); }
.ecard-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: .5px; margin-bottom: 1px; }
.ecard-sub { font-size: 12px; color: var(--muted); margin-bottom: 9px; }
.chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 11px; }
.chip { background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; font-size: 11px; color: var(--muted); padding: 2px 7px; font-family: ; }
.ecard-acts { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-delete { background: #fff0f0; color: var(--red); border: 1.5px solid #fecaca; }
.btn-delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* ── Modal ── */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-ov.open { display: flex; }
.modal { background: #fff; border: 1px solid var(--border); border-radius: 14px; width: 90vw; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.print-qty-row { display: flex; align-items: center; gap: 10px; background: var(--surf2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; }
.print-qty-row label { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.edit-inp { width:100%; background:var(--surf2); border:1.5px solid var(--border); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:8px 12px; outline:none; transition: border-color .15s; }
.edit-inp.upper { text-transform: uppercase; }
.edit-inp:focus { border-color:var(--indigo); background:#fff; }
.print-qty-row input { width: 70px; text-align: center; background: #fff; border: 1.5px solid var(--border); border-radius: 7px; font-size: 15px; font-weight: 700; padding: 6px 8px; outline: none; }
.print-mode-row { display: flex; gap: 8px; margin-bottom: 14px; }
.mode-btn { flex: 1; padding: 9px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surf2); font-family: 'DM Sans',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--muted); }
.mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-hdr h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); }
.modal-close:hover { color: var(--red); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 22px; right: 22px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 500;
  z-index: 9999; opacity: 0; transform: translateY(8px); transition: all .2s; max-width: 260px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok  { border-color: var(--green); color: var(--green); }
#toast.err { border-color: var(--red);   color: var(--red); }

/* ── Misc ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 42px; margin-bottom: 10px; }
.loader { display: flex; justify-content: center; padding: 40px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ean-hint { font-family: ; font-size: 11px; color: var(--muted); margin-top: 4px; }
.divider-label { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: .5px; margin: 8px 0 4px; }

/* ── Print ── */
@media print {
  @page { size: 150mm 100mm landscape; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">🏷 Etiketer <span class="logo-badge">v2</span></div>
  <button class="tab-btn active" id="tab-crear"  onclick="showTab('crear')">+ Crear Etiqueta</button>
  <button class="tab-btn"        id="tab-buscar" onclick="showTab('buscar')">🔍 Buscar / Imprimir</button>
  <div class="spacer"></div>

  <div class="fb-status">
    <div class="fb-dot" id="fb-dot"></div>
    <span id="fb-label">Conectando...</span>
  </div>
</header>

<!-- ══ CREAR ══ -->
<div class="app active" id="app-crear">

  <div class="panel">
    <div class="ph"><span class="ph-title">Datos de la etiqueta</span></div>
    <div class="pb">

      <div class="field">
        <label>Logo / Marca</label>
        <select id="f-logo" onchange="renderPreview()">
          <option value="dmp">DMP — Distribuidora de Materias Primas</option>
          <option value="aio">AIO — All In One</option>
          <option value="masco">Mascokits</option>
        </select>
      </div>

      <div class="field">
        <label>Título</label>
        <input id="f-titulo" type="text" placeholder="CAFEÍNA ANHIDRA" class="upper" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Subtítulo / Grado</label>
        <input id="f-subtitulo" type="text" placeholder="Food Grade" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Subtítulo 2</label>
        <input id="f-subtitulo2" type="text" placeholder="Ej: 99.9% Pureza" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Contenido Neto</label>
        <div class="rg" id="cont-group"></div>
        <input id="f-cont-custom" type="text" placeholder="Otro (ej: 20 Litros, 50 Kilos...)" style="margin-top:8px;" oninput="if(this.value){selConts=[];document.querySelectorAll('#cont-group input').forEach(i=>i.checked=false);}renderPreview()">
      </div>

      <div class="field">
        <label>Fecha de Vencimiento</label>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0;cursor:pointer;">
            <input type="checkbox" id="f-venc-auto" onchange="toggleVencAuto()" style="width:15px;height:15px;accent-color:var(--indigo);cursor:pointer;">
            Auto desde hoy
          </label>
          <select id="f-venc-years" onchange="calcVencAuto()" style="display:none;flex:1;background:var(--surf2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;outline:none;">
            <option value="1">+ 1 año</option>
            <option value="2">+ 2 años</option>
          </select>
        </div>
        <input id="f-venc" type="month" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>País de Origen</label>
        <input id="f-pais" type="text" value="China" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Dosis / Instrucción de uso</label>
        <input id="f-dosis" type="text" value="0,5 gr al día" oninput="renderPreview()">
      </div>

      <div class="field">
        <label>Código EAN-13</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="f-ean" type="text" maxlength="13" placeholder="Autogenerado" style="flex:1;" oninput="renderPreview()">
          <button class="btn btn-outline btn-sm" onclick="nuevoEAN()">🎲 Nuevo</button>
        </div>
        <div class="ean-hint" id="ean-hint"></div>
      </div>

      <div class="field">
        <label>Footer Línea 1</label>
        <input id="f-footer" type="text" value="DMP es una marca de Cybernetic SpA, Providencia, Santiago de Chile." oninput="renderPreview()">
      </div>
      <div class="field">
        <label>Footer Línea 2</label>
        <input id="f-footer2" type="text" value="https://distribuidoramp.cl/" oninput="renderPreview()">
      </div>

      <button class="btn btn-green btn-full" onclick="guardar()">💾 Guardar en Firebase</button>

    </div>
  </div>

  <!-- Preview + ZPL -->
  <div class="preview-wrap">
    <div class="panel">
      <div class="ph">
        <span class="ph-title">Vista Previa — 15 × 10 cm</span>
        <span id="preview-count" style="font-size:11px;font-weight:600;color:var(--indigo);background:#ede9fe;padding:2px 8px;border-radius:12px;"></span>
      </div>
      <div style="padding:0;">
        <div class="pv-outer" style="padding:16px;">
          <canvas id="preview-canvas" style="max-width:100%;border-radius:2px;box-shadow:0 3px 16px rgba(0,0,0,.22);"></canvas>
          <div id="preview-main" class="lp" style="display:none;"></div>
        </div>
      </div>
    </div>

    </div>
</div>

<!-- ══ BUSCAR ══ -->
<div class="app" id="app-buscar">
  <div>
    <div class="search-bar">
      <input id="search-q" type="text" placeholder="Buscar por título, subtítulo o EAN..." oninput="filtrar()">
      <button class="btn btn-outline" onclick="cargar()">🔄 Actualizar</button>
    </div>
    <div id="lista"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- Modal ver/imprimir -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-titulo">Etiqueta</h2>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Modal editar -->
<div class="modal-ov" id="edit-ov" onclick="if(event.target===this)cerrarEdit()">
  <div class="modal" style="max-width:500px;">
    <div class="modal-hdr">
      <h2>✏️ Editar Etiqueta</h2>
      <button class="modal-close" onclick="cerrarEdit()">✕</button>
    </div>
    <div id="edit-body"></div>
  </div>
</div>

<div id="print-area" style="display:none;"></div>
<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const cfg = {
  apiKey:"AIzaSyBdbwTXVTKY1v6T0QsOdBfXeBzS4heZwjs",
  authDomain:"etike-bcf2a.firebaseapp.com",
  projectId:"etike-bcf2a",
  storageBucket:"etike-bcf2a.firebasestorage.app",
  messagingSenderId:"635979667064",
  appId:"1:635979667064:web:b304d53b59a798fc287f8d"
};
try {
  const app = initializeApp(cfg);
  const db  = getFirestore(app);
  window.$db=db; window.$col=(n)=>collection(db,n);
  window.$add=addDoc; window.$get=getDocs;
  window.$doc=(id)=>doc(db,'etiquetas',id);
  window.$upd=updateDoc; window.$del=deleteDoc;

const OPTS_PESO   = ['100 gr','250 gr','500 gr','1 Kilo','5 Kilos','10 Kilos','25 Kilos'];
const OPTS_LIQUID = ['500 ml','1 Litro','1 Galón','5 Litros','20 Litros'];
let selConts = ['1 Kilo'];

(function initRadios(){
  const g = document.getElementById('cont-group');
  const mkSection = (lbl) => {
    const s = document.createElement('div');
    s.className = 'rg-section'; s.textContent = lbl; return s;
  };
  g.appendChild(mkSection('Peso'));
  OPTS_PESO.forEach((o,i) => addRadio(g, o, 'p'+i, selConts.includes(o)));
  g.appendChild(mkSection('Líquidos'));
  OPTS_LIQUID.forEach((o,i) => addRadio(g, o, 'l'+i, selConts.includes(o)));
})();

function addRadio(g, o, id, checked=false) {
  const d = document.createElement('div');
  d.className = 'ro';
  d.innerHTML = `<input type="checkbox" id="co${id}" value="${o}" ${checked?'checked':''}><label for="co${id}">${o}</label>`;
  d.querySelector('input').addEventListener('change', function(){
    if(this.checked && !selConts.includes(o)) selConts.push(o);
    else selConts = selConts.filter(x=>x!==o);
    document.getElementById('f-cont-custom').value = '';
    renderPreview();
  });
  g.appendChild(d);
}

// ══ EAN-13 ══
function ean13check(base12){
  let s = 0;
  for(let i = 0; i < 12; i++){
    const d = parseInt(base12[i], 10);
    if(isNaN(d)) return '0';
    s += d * (i % 2 === 0 ? 1 : 3);
  }
  return String((10 - (s % 10)) % 10);
}
function makeEAN(){
  // Genera 9 dígitos aleatorios (prefijo 978 + 9 dígitos = 12) + check
  let rand = '';
  for(let i = 0; i < 9; i++) rand += String(Math.floor(Math.random() * 10));
  const base12 = '978' + rand;          // exactamente 12 dígitos
  const check  = ean13check(base12);
  const ean    = base12 + check;
  console.log('EAN generado:', ean, 'len:', ean.length);
  return ean;
}
let curEAN = makeEAN();

function nuevoEAN(){ curEAN=makeEAN(); document.getElementById('f-ean').value=curEAN; renderPreview(); }
function getEAN(){ const v=(document.getElementById('f-ean').value||'').trim(); return v.length===13?v:curEAN; }

function datos(){
  return {
    logo:      document.getElementById('f-logo').value    ||'dmp',
    titulo:    (document.getElementById('f-titulo').value||'PRODUCTO').toUpperCase(),
    subtitulo: document.getElementById('f-subtitulo').value||'',
    subtitulo2: document.getElementById('f-subtitulo2').value||'',
    contenidos: (()=>{
      const custom = document.getElementById('f-cont-custom').value.trim();
      if(custom) return [custom];
      return selConts.length ? [...selConts] : ['1 Kilo'];
    })(),
    venc:      (()=>{
      const auto = document.getElementById('f-venc-auto').checked;
      if(auto){
        const years = parseInt(document.getElementById('f-venc-years').value||'1');
        const exp   = new Date(new Date().getFullYear()+years, new Date().getMonth(), 1);
        return exp.getFullYear()+'-'+String(exp.getMonth()+1).padStart(2,'0');
      }
      return document.getElementById('f-venc').value||'';
    })(),
    venc_auto:  document.getElementById('f-venc-auto').checked,
    venc_years: parseInt(document.getElementById('f-venc-years').value||'1'),
    pais:      document.getElementById('f-pais').value    ||'',
    dosis:     document.getElementById('f-dosis').value   ||'',
    footer:    document.getElementById('f-footer').value  ||'DMP es una marca de Cybernetic SpA, Providencia, Santiago de Chile.',
    footer2:   document.getElementById('f-footer2') ? document.getElementById('f-footer2').value : 'https://distribuidoramp.cl/',
    ean13:     getEAN(),
  };
}

const STD_PESO   = ['¼ Kilo','½ Kilo','1 Kilo'];
const STD_LIQUID = ['500 ml','1 Litro','1 Galón','5 Litros'];

function resolveVenc(d){
  // Si la etiqueta tiene auto-fecha, recalcula desde hoy
  if(d.venc_auto && d.venc_years){
    const exp = new Date(new Date().getFullYear()+d.venc_years, new Date().getMonth(), 1);
    return exp.getFullYear()+'-'+String(exp.getMonth()+1).padStart(2,'0');
  }
  return d.venc||'';
}

// ══ ZPL ══
// 15cm × 10cm landscape @ 203 DPI = 1218 × 812 dots
// PW=1218, LL=812
// Col IZQ x=0..230, Col CTR x=230..900, Col DER x=900..1218




async function dibujarEtiquetaCanvas(ctx, e, W, H){
  await document.fonts.ready;

  const S  = W / 567;
  const f  = n => n * S;

  const fv = (() => {
    const rv = resolveVenc(e);
    return rv ? (([y,m]) => m+'/'+y.slice(2))(rv.split('-')) : '';
  })();

  const COL_L = f(118);
  const COL_R = f(130);
  const CX    = COL_L + (W - COL_L - COL_R) / 2;

  // Fondo blanco
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Solo las 2 líneas separadoras internas — sin borde exterior
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = f(1.5);
  ctx.beginPath();
  ctx.moveTo(COL_L, 0);     ctx.lineTo(COL_L, H);
  ctx.moveTo(W-COL_R, 0);   ctx.lineTo(W-COL_R, H);
  ctx.stroke();

  // ══ COL IZQUIERDA — texto rotado ══
  ctx.save();
  ctx.translate(COL_L / 2, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'left';

  const LH  = f(14);
  const FS  = f(10);
  const FSB = f(11.5);

  const bloques = [
    {
      titulo: 'Manipulacion y almacenaje:',
      lineas: ['Utilice siempre EPP (Elementos de','Proteccion Personal) adecuado.','Almacene en areas secas, frescas','y ventiladas. Evite calor y sol.','Mantenga alejado de mascotas y ninos.']
    },
    {
      titulo: 'Primeros auxilios:',
      lineas: ['En caso de intoxicacion consulte a','su medico o llame al CITUC:','02 2635 3800 — Atencion 24hrs.']
    },
  ];

  bloques.forEach((bloque, bi) => {
    const startX = -H/2 + f(10) + bi * (H/2 - f(10));
    let curY = -COL_L/2 + f(14);
    ctx.font = 'bold '+FSB+'px "DM Sans",Arial,sans-serif';
    ctx.fillStyle = '#111';
    ctx.fillText(bloque.titulo, startX, curY);
    curY += LH * 1.2;
    ctx.font = FS+'px "DM Sans",Arial,sans-serif';
    ctx.fillStyle = '#111';
    bloque.lineas.forEach(l => { ctx.fillText(l, startX, curY); curY += LH; });
  });

  ctx.restore();

  // ══ COL CENTRAL — logo + titulo centrados verticalmente en mitad superior ══
  const logoW = f(90), logoH = f(77); // ratio 1308:1120 = 1.168 (logo DMP final)
  // Zona superior: desde top hasta el divider (H*0.55)
  // Centrar logo+titulo+subtitulo en esa zona
  const zoneTop = f(10);
  const zoneMid = H * 0.52;
  const blockH  = logoH + f(34) + (e.subtitulo ? f(20) : 0) + (e.subtitulo2 ? f(16) : 0);
  const blockY  = zoneTop + (zoneMid - zoneTop - blockH) / 2;

  // Logo
  const logoKey = (e.logo||'dmp').toLowerCase();
  const logoSrc = LOGOS[logoKey];
  const logoY   = Math.max(f(10), blockY);
  if(logoSrc){
    await new Promise(res => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { ctx.drawImage(img, CX-logoW/2, logoY, logoW, logoH); res(); };
      img.onerror = res;
      img.src = logoSrc;
    });
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(CX-f(55), logoY, f(110), f(44));
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold '+f(30)+'px "Bebas Neue",Arial,sans-serif';
    ctx.fillText(LOGO_TEXT[logoKey]||'DMP', CX, logoY+f(34));
  }

  // Título centrado bajo el logo
  const tSz = e.titulo.length > 18 ? f(26) : e.titulo.length > 12 ? f(30) : f(34);
  const titY = logoY + logoH + f(32);
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.letterSpacing = f(3)+'px';
  ctx.font = 'bold '+tSz+'px "Bebas Neue",Arial,sans-serif';
  ctx.fillText((e.titulo||'').toUpperCase(), CX, titY);
  ctx.letterSpacing = '0px';

  // Subtítulo
  const subY = titY + f(18);
  if(e.subtitulo){
    ctx.fillStyle = '#555';
    ctx.font = 'italic '+f(13)+'px "DM Sans",Arial,sans-serif';
    ctx.fillText(e.subtitulo, CX, subY);
  }

  // Subtítulo 2
  const sub2Y = subY + (e.subtitulo ? f(16) : 0);
  if(e.subtitulo2){
    ctx.fillStyle = '#666';
    ctx.font = f(11.5)+'px "DM Sans",Arial,sans-serif';
    ctx.fillText(e.subtitulo2, CX, sub2Y);
  }

  // Divider
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = f(1);
  const divBaseY = e.subtitulo2 ? sub2Y : (e.subtitulo ? subY : titY);
  const divTopY = divBaseY + f(14);
  const divBotY = divTopY + f(40);
  ctx.beginPath();
  ctx.moveTo(CX, divTopY); ctx.lineTo(CX, divBotY);
  ctx.stroke();

  // Contenido neto — anclado a la parte inferior con espacio para el footer
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.font = '600 '+f(9)+'px "DM Sans",Arial,sans-serif';
  ctx.fillText('CONTENIDO NETO', CX, H-f(72));

  ctx.fillStyle = '#111';
  ctx.font = 'bold '+f(26)+'px "DM Sans",Arial,sans-serif';
  ctx.fillText(e.contenido||'', CX, H-f(46));

  // Footer — auto-reduce font size to fit full text
  if(e.footer || e.footer2){
    ctx.save();
    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const fSize = f(9.5);
    ctx.font = fSize + 'px "DM Sans",Arial,sans-serif';
    const lineH = fSize * 1.4;
    const line1 = e.footer  || '';
    const line2 = e.footer2 || '';
    const totalH = (line1 && line2) ? lineH*2 : lineH;
    const footerY = H - f(6) - totalH;
    if(line1) ctx.fillText(line1, CX, footerY);
    if(line2) ctx.fillText(line2, CX, footerY + (line1 ? lineH : 0));
    ctx.restore();
  }

  // ══ COL DERECHA ══
  const RX = W - COL_R + f(8);
  ctx.save();
  ctx.textAlign = 'left';

  const infoItems = [
    e.dosis ? ['Dosis: ',  e.dosis] : null,
    (e.pais && e.pais.trim()) ? ['Origen: ', e.pais]  : null,
    fv      ? ['Venc: ',   fv]      : null,
  ].filter(Boolean);

  const bcH   = f(60);
  const bcY   = H - bcH - f(10);
  const iFS   = f(9.5);
  const iStartY = bcY - infoItems.length * f(18) - f(10);

  infoItems.forEach(([lbl, val], i) => {
    const y = iStartY + i * f(18);
    ctx.fillStyle = '#111';
    ctx.font = 'bold '+iFS+'px "DM Sans",Arial,sans-serif';
    ctx.fillText(lbl, RX, y);
    ctx.fillStyle = '#333';
    ctx.font = iFS+'px "DM Sans",Arial,sans-serif';
    ctx.fillText(val, RX + ctx.measureText(lbl).width, y);
  });
  ctx.restore();

  // Barcode
  if(e.ean13 && e.ean13.length===13 && /^[0-9]+$/.test(e.ean13)){
    const bcCv  = document.createElement('canvas');
    const bcW   = COL_R - f(16);
    try {
      JsBarcode(bcCv, e.ean13, {
        format:'EAN13', width:Math.max(1,Math.round(bcW/95)),
        height:bcH, displayValue:true, fontSize:f(9),
        margin:f(3), background:'#ffffff', lineColor:'#000',
      });
      ctx.drawImage(bcCv, W-COL_R+f(4), bcY, Math.min(bcW, bcCv.width), bcH);
    } catch(err){ console.warn('BC',err); }
  }
}

function abrirEdit(id){
  const e = todas.find(x=>x.id===id); if(!e) return;
  const body = document.getElementById('edit-body');

  // Build form using DOM — avoids quote escaping issues
  const inp = (f) => `
    <div class="field">
      <label>${f.label}</label>
      <input id="${f.id}" type="${f.type}" class="edit-inp${f.upper?' upper':''}">
    </div>`;
  body.innerHTML = EDIT_FIELDS.map(inp).join('') + `
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button class="btn btn-green" id="btn-save-edit" style="flex:1;justify-content:center;">💾 Guardar Cambios</button>
      <button class="btn btn-outline" onclick="cerrarEdit()">Cancelar</button>
    </div>`;

  // Set values safely via .value property
  EDIT_FIELDS.forEach(f => {
    document.getElementById(f.id).value = e[f.key] || '';
  });
  document.getElementById('btn-save-edit').onclick = () => guardarEdit(id);
  document.getElementById('edit-ov').classList.add('open');
}

function cerrarEdit(){ document.getElementById('edit-ov').classList.remove('open'); }

async function guardarEdit(id){
  if(!window.$db){ toast('Firebase no conectado','err'); return; }
  const titulo    = document.getElementById('ed-titulo').value.trim().toUpperCase();
  const contenido = document.getElementById('ed-contenido').value.trim();
  const updates = {
    titulo,
    subtitulo:      document.getElementById('ed-subtitulo').value.trim(),
    subtitulo2:     document.getElementById('ed-subtitulo2').value.trim(),
    contenido,
    titulo_completo: titulo + (contenido ? ' - '+contenido : ''),
    venc:           document.getElementById('ed-venc').value,
    pais:           document.getElementById('ed-pais').value.trim(),
    dosis:          document.getElementById('ed-dosis').value.trim(),
    footer:         document.getElementById('ed-footer').value.trim(),
    footer2:        document.getElementById('ed-footer2') ? document.getElementById('ed-footer2').value.trim() : '',
  };
  // Recalcular ZPL con datos actualizados
  const e = todas.find(x=>x.id===id);
  // ZPL se regenera al imprimir, no se guarda en edición
  try {
    await window.$upd(window.$doc(id), updates);
    toast('Cambios guardados ✓','ok');
    cerrarEdit();
    cargar(); // recargar lista
  } catch(err){ toast('Error: '+err.message,'err'); }
}

function eliminarCard(id, nombre){

  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);';

  const icon = document.createElement('div');
  icon.style.cssText = 'font-size:40px;margin-bottom:10px;';
  icon.textContent = '🗑️';

  const h = document.createElement('div');
  h.style.cssText = 'font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:1px;color:#0f1117;margin-bottom:6px;';
  h.textContent = 'Eliminar etiqueta';

  const sub = document.createElement('div');
  sub.style.cssText = 'font-size:13px;color:#6b7280;margin-bottom:22px;line-height:1.5;';
  sub.textContent = nombre ? '"' + nombre + '"' : 'Esta acción no se puede deshacer.';

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:center;';

  const btnCancel = document.createElement('button');
  btnCancel.className = 'btn btn-outline';
  btnCancel.style.cssText = 'flex:1;justify-content:center;';
  btnCancel.textContent = 'Cancelar';
  btnCancel.onclick = () => document.body.removeChild(ov);

  const btnDel = document.createElement('button');
  btnDel.className = 'btn';
  btnDel.style.cssText = 'flex:1;justify-content:center;background:#dc2626;color:#fff;';
  btnDel.textContent = 'Eliminar';
  btnDel.onclick = async () => {
    btnDel.textContent = '...';
    btnDel.disabled = true;
    try {
      await window.$del(window.$doc(id));
      document.body.removeChild(ov);
      todas = todas.filter(x => x.id !== id);
      renderLista(todas);
      toast('Etiqueta eliminada', 'ok');
    } catch(e) {
      toast('Error: ' + e.message, 'err');
      document.body.removeChild(ov);
    }
  };

  btnRow.appendChild(btnCancel);
  btnRow.appendChild(btnDel);
  box.appendChild(icon);
  box.appendChild(h);
  box.appendChild(sub);
  box.appendChild(btnRow);
  ov.appendChild(box);
  ov.addEventListener('click', e => { if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

let todas = [];

async function cargar(){
  if(!window.$db){
    document.getElementById('lista').innerHTML =
      '<div class="empty"><div class="empty-icon">🔌</div><p>Configura Firebase primero.</p></div>';
    return;
  }
  document.getElementById('lista').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const snap = await window.$get(window.$q(window.$col('etiquetas'), window.$ord('created_at','desc')));
    todas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderLista(todas);
  } catch(e){
    document.getElementById('lista').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><p>'+e.message+'</p></div>';
  }
}

function filtrar(){
  const q = document.getElementById('search-q').value.toLowerCase();
  renderLista(todas.filter(e =>
    (e.titulo||'').toLowerCase().includes(q) ||
    (e.subtitulo||'').toLowerCase().includes(q) ||
    (e.ean13||'').includes(q)
  ));
}

function renderLista(lista){
  if(!lista.length){
    document.getElementById('lista').innerHTML =
      '<div class="empty"><div class="empty-icon">📭</div><p>No hay etiquetas guardadas aún.</p></div>';
    return;
  }
  const fv = e => e.venc ? (([y,m])=>'Venc: '+m+'/'+y.slice(2))(e.venc.split('-')) : '';
  document.getElementById('lista').innerHTML =
    '<div class="cards-grid">'+lista.map(e => `
      <div class="ecard">
        <div class="ecard-thumb"><canvas id="cv-${e.id}" style="width:280px;height:187px;display:block;"></canvas></div>
        <div class="ecard-body">
          <div class="ecard-titulo">${e.titulo||'—'}</div>
          <div class="ecard-sub">${e.subtitulo||''} · ${e.contenido||''}</div>
          <div class="chips">
            <span class="chip">${e.ean13||''}</span>
            ${fv(e)?'<span class="chip">'+fv(e)+'</span>':''}
            <span class="chip">${(e.logo||'').toUpperCase()}</span>
          </div>
          <div class="ecard-acts">
            <button class="btn btn-dark btn-sm" onclick="abrirModal('${e.id}')">🖨️ Imprimir</button>
            <button class="btn btn-outline btn-sm" onclick="abrirEdit('${e.id}')">✏️ Editar</button>
            
            <button class="btn btn-delete btn-sm" onclick="eliminarCard('${e.id}','${(e.titulo_completo||e.titulo||'').replace(/'/g,'')}'  )">🗑</button>
          </div>
        </div>
      </div>`).join('')+'</div>';

  setTimeout(()=>{
    lista.forEach(e=>{
      const cv = document.getElementById('cv-'+e.id);
      if(!cv) return;
      cv.width = 560; cv.height = 373;
      cv.style.width='280px'; cv.style.height='187px';
      const ctx = cv.getContext('2d');
      ctx.scale(2,2);
      dibujarEtiquetaCanvas(ctx, e, 280, 187);
    });
  }, 150);
}

// ══ GUARDAR ══
async function guardar(){
  if(!window.$db){ toast('Firebase no conectado','err'); return; }
  const d = datos();
  const base = {...d};
  delete base.contenidos;
  try {
    let count = 0;
    for(const cont of d.contenidos){
      const ean = makeEAN();
      const doc = {
        ...base,
        contenido:       cont,
        titulo_completo: d.titulo + ' - ' + cont,
        ean13:           ean,
        created_at:      window.$ts(),
      };
      await window.$add(window.$col('etiquetas'), doc);
      count++;
    }
    mostrarConfirmacion(
      count > 1 ? count+' etiquetas guardadas' : '1 etiqueta guardada',
      d.titulo,
      d.contenidos.join(', ')
    );
  } catch(err){ toast('Error: '+err.message,'err'); }
}

  actRow.style.cssText='display:flex;gap:10px;margin-top:4px;';

  const btnImprimir = document.createElement('button');
  btnImprimir.className='btn btn-dark'; btnImprimir.style.cssText='flex:1;justify-content:center;font-size:15px;padding:12px;';
  btnImprimir.innerHTML='🖨️ Imprimir';
  btnImprimir.onclick=()=>{ cerrarModal(); imprimirBrowser(e, Math.max(1,parseInt(document.getElementById('print-qty').value)||1)); };

  const btnPptx = document.createElement('button');
  btnPptx.className='btn btn-outline'; btnPptx.style.cssText='flex:1;justify-content:center;';
  btnPptx.innerHTML='🖼️ IMAGEN';
  btnPptx.onclick=()=>{ cerrarModal(); exportarImagen(e, Math.max(1,parseInt(document.getElementById('print-qty').value)||1)); };

  actRow.appendChild(btnImprimir);
  actRow.appendChild(btnPptx);
  body.appendChild(actRow);

  document.getElementById('modal-ov').classList.add('open');
}

function cerrarModal(){ document.getElementById('modal-ov').classList.remove('open'); }

function mostrarConfirmacion(msg, titulo, contenidos){
  const ov = document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:14px;padding:32px 28px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);';
  const icon = document.createElement('div'); icon.style.cssText='font-size:48px;margin-bottom:12px;'; icon.textContent='✅';
  const h = document.createElement('div'); h.style.cssText='font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:1px;color:#0f1117;margin-bottom:6px;'; h.textContent=msg;
  const sub = document.createElement('div'); sub.style.cssText='font-size:14px;color:#6b7280;margin-bottom:4px;'; sub.textContent=titulo;
  const cont = document.createElement('div'); cont.style.cssText='font-size:13px;color:#4f46e5;font-weight:600;margin-bottom:24px;'; cont.textContent=contenidos;
  const btnRow = document.createElement('div'); btnRow.style.cssText='display:flex;gap:10px;justify-content:center;';
  const btnBuscar = document.createElement('button'); btnBuscar.className='btn btn-dark'; btnBuscar.style.cssText='flex:1;justify-content:center;'; btnBuscar.textContent='Ver etiquetas'; btnBuscar.onclick=()=>{ document.body.removeChild(ov); showTab('buscar'); };
  const btnNueva = document.createElement('button'); btnNueva.className='btn btn-outline'; btnNueva.style.cssText='flex:1;justify-content:center;'; btnNueva.textContent='Crear otra'; btnNueva.onclick=()=>document.body.removeChild(ov);
  btnRow.appendChild(btnBuscar); btnRow.appendChild(btnNueva);
  box.appendChild(icon); box.appendChild(h); box.appendChild(sub); box.appendChild(cont); box.appendChild(btnRow);
  ov.appendChild(box);
  ov.addEventListener('click', ev=>{ if(ev.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

async function imprimirBrowser(e, qty){
  toast('Renderizando a 300 DPI...','ok');
  await new Promise(r=>setTimeout(r,80));
  const CW=1772, CH=1181;
  const paginas=[];
  for(let i=0;i<qty;i++){
    const cv=document.createElement('canvas');
    cv.width=CW; cv.height=CH;
    const ctx=cv.getContext('2d');
    await dibujarEtiquetaCanvas(ctx,e,CW,CH);
    paginas.push(cv.toDataURL('image/png'));
  }
  const printWin=window.open('','_blank','width=900,height=700');
  if(!printWin){ toast('Permite ventanas emergentes','err'); return; }
  const imgsHTML=paginas.map(src=>'<div class="pg"><img src="'+src+'" class="lbl-img"></div>').join('');
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Etiqueta</title>
<style>
@page{size:150mm 100mm landscape;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;margin:0 !important;padding:0 !important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
html,body{margin:0!important;padding:0!important;width:150mm;height:100mm;overflow:hidden;background:#fff;}
.pg{width:150mm;height:100mm;overflow:hidden;position:relative;page-break-after:always;page-break-inside:avoid;display:block;margin:0!important;padding:0!important;}
.pg:last-child{page-break-after:avoid;}
.lbl-img{position:absolute;top:0;left:0;width:150mm!important;height:100mm!important;display:block;margin:0!important;padding:0!important;object-fit:fill;}
@media screen{html,body{width:auto!important;height:auto!important;overflow:auto;}body{background:#555;padding:20px!important;display:flex;flex-direction:column;gap:20px;align-items:center;}.pg{box-shadow:0 2px 20px rgba(0,0,0,.4);}}
</style></head><body>${imgsHTML}
<script>
let loaded=0;
const imgs=document.querySelectorAll('img');
function tryPrint(){loaded++;if(loaded>=imgs.length){setTimeout(()=>window.print(),400);}}
imgs.forEach(img=>{if(img.complete)tryPrint();else{img.onload=tryPrint;img.onerror=tryPrint;}});
if(imgs.length===0)setTimeout(()=>window.print(),400);
<\/script></body></html>`);
  printWin.document.close();
}


function imprimir(id){
  const e=todas.find(x=>x.id===id); if(!e) return;
  imprimirBrowser(e,1);
}

async function exportarImagen(e, qty){
  toast('Generando imagen a 300 DPI...','ok');
  await new Promise(r=>setTimeout(r,80));
  const CW=1772, CH=1181; // 15x10 cm @ 300 DPI
  const base = (e.titulo_completo||e.titulo||'etiqueta')
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || 'etiqueta';

  for(let i=0;i<qty;i++){
    const cv=document.createElement('canvas');
    cv.width=CW; cv.height=CH;
    const ctx=cv.getContext('2d');
    await dibujarEtiquetaCanvas(ctx,e,CW,CH);
    const url = cv.toDataURL('image/png');
    const a=document.createElement('a');
    a.href = url;
    a.download = qty>1 ? `${base}_${i+1}.png` : `${base}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    if(i<qty-1) await new Promise(r=>setTimeout(r,200));
  }
  toast(qty>1 ? 'Imágenes descargadas' : 'Imagen descargada','ok');
}




// ══ TABS ══
function showTab(t){
  ['crear','buscar'].forEach(x=>{
    document.getElementById('app-'+x).classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='buscar') cargar();
}

// ══ TOAST ══
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(el._t); el._t=setTimeout(()=>{el.className='';},3000);
}
